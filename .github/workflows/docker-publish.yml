name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix UTF-16 Docker files from Windows
        run: |
          set -e
          for f in Dockerfile nginx.conf .dockerignore; do
            if [ -f "$f" ] && file "$f" | grep -qi utf-16; then
              echo "Converting $f from UTF-16 to UTF-8"
              iconv -f UTF-16LE -t UTF-8 "$f" -o "$f.tmp"
              mv "$f.tmp" "$f"
            fi
          done

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lawgics/ahoy-bump-maker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
